---
# OCP SR-IOV default configurations.
ocp_sriov_test_container: quay.io/ocp-edge-qe/eco-gotests-sriov-client:v4.15.2
sriov_operator_namespace: openshift-sriov-network-operator

# Default VF count
vf_num: 2

# Browser automation configuration for GUI tests.
# Console URL/credentials must be provided via environment variables.
# console_url: ""  # Set via ECO_OCP_CONSOLE_URL
# console_username: ""  # Set via ECO_OCP_CONSOLE_USERNAME
# console_password: ""  # Set via ECO_OCP_CONSOLE_PASSWORD
browser_headless: true
browser_slowmo_ms: 0
screenshot_dir: /tmp/screenshots

# Default device configurations.
# Override using SRIOV_DEVICES env var with format: name:deviceid:vendor:interface,...
devices:
  - name: e810xxv
    device_id: "159b"
    vendor: "8086"
    interface_name: "eno12409"
    supports_min_tx_rate: true
  - name: e810c
    device_id: "1593"
    vendor: "8086"
    interface_name: "ens2f2"
    supports_min_tx_rate: true
  - name: cx7
    device_id: "1021"
    vendor: "15b3"
    interface_name: "ens8f0np0"
    supports_min_tx_rate: true
